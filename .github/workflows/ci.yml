name: CI

# Pull requests run this workflow directly. Pushes to main run it through
# release.yml so release gating and CI stay in one main-branch path.
on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: ${{ steps.tool-versions.outputs.helm }}

      - name: Run Go and Helm lint checks
        run: make ci-lint

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Run tests with coverage
        run: make ci-test
        env:
          CI_COVERAGE_THRESHOLD: 65

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          file: ./xtrinode/coverage.out
          flags: unittests
          name: codecov-umbrella
          token: ${{ env.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: xtrinode/coverage.out
          retention-days: 7

  verify-manifests:
    name: Verify Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Verify generated manifests
        run: make ci-verify-manifests

  release-pr-policy:
    name: Release PR Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate release PR author
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO_OWNER: ${{ github.event.pull_request.head.repo.owner.login }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: make ci-release-pr-policy

  terraform-validate:
    name: Terraform Validate (gcp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ steps.tool-versions.outputs.terraform }}

      - name: Validate Terraform
        run: make ci-terraform-validate CLOUD=gcp

  image-matrix:
    name: Image Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate image matrix
        id: matrix
        run: make ci-image-matrix-output

  docker-build:
    name: Docker Build (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [lint, test, verify-manifests, terraform-validate, image-matrix]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.image-matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr

      - name: Compute build timestamp
        id: build-date
        run: make ci-build-date-output

      - name: Build image for scan
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: xtrinode
          file: docker/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          tags: local/${{ matrix.image }}:scan-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          build-args: |
            GO_VERSION=${{ steps.tool-versions.outputs.go }}
            ALPINE_VERSION=${{ steps.tool-versions.outputs.alpine }}
            APP_PACKAGE=${{ matrix.package }}
            APP_PORT=${{ matrix.port }}
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.value }}

      - name: Scan image
        run: make ci-scan-image IMAGE=local/${{ matrix.image }}:scan-${{ github.sha }}

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: xtrinode
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            GO_VERSION=${{ steps.tool-versions.outputs.go }}
            ALPINE_VERSION=${{ steps.tool-versions.outputs.alpine }}
            APP_PACKAGE=${{ matrix.package }}
            APP_PORT=${{ matrix.port }}
            VERSION=${{ steps.meta.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build-date.outputs.value }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Install Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: ${{ steps.tool-versions.outputs.helm }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Run security checks
        run: make ci-security

      - name: Upload Trivy SARIF
        if: always() && github.event_name == 'push' && hashFiles('trivy-fs-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@53e96ec3b35fce51c141c0d6f0e31028a448722d # v3
        with:
          sarif_file: trivy-fs-results.sarif
