name: CI

# Pull requests run this workflow directly. Pushes to main run it through
# release.yml so release gating and CI stay in one main-branch path.
on:
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Install Go lint tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ steps.tool-versions.outputs.golangci_lint }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ steps.tool-versions.outputs.node }}
          cache: npm

      - name: Install Node tools
        run: npm ci

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ steps.tool-versions.outputs.ruby }}

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: ${{ steps.tool-versions.outputs.helm }}

      - name: Run Go, Shell, YAML, Helm, and Markdown lint checks
        run: make ci-lint

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Run tests with coverage
        run: make ci-test
        env:
          CI_COVERAGE_THRESHOLD: 70

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          file: ./xtrinode/coverage.out
          flags: unittests
          name: codecov-umbrella
          token: ${{ env.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: xtrinode/coverage.out
          retention-days: 7

  verify-manifests:
    name: Verify Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.tool-versions.outputs.go }}
          cache-dependency-path: xtrinode/go.sum

      - name: Install manifest generation tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@${{ steps.tool-versions.outputs.controller_gen }}

      - name: Verify generated manifests
        run: make ci-verify-manifests

  release-pr-policy:
    name: Release PR Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate release PR author
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO_OWNER: ${{ github.event.pull_request.head.repo.owner.login }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: make ci-release-pr-policy

  terraform-validate:
    name: Terraform Validate (gcp)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ steps.tool-versions.outputs.terraform }}

      - name: Validate Terraform
        run: make ci-terraform-validate CLOUD=gcp

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read CI tool versions
        id: tool-versions
        run: make ci-tool-versions-output

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: ${{ steps.tool-versions.outputs.helm }}

      - name: Set up Trivy
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6

      - name: Run security checks
        run: make ci-security
