{{- if and .Values.gateway.apiServerAuth.enabled (not .Values.gateway.apiServerAuth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xtrinode-gateway.apiServerAuthSecretName" . }}
  namespace: {{ include "xtrinode-gateway.namespace" . }}
  labels:
    {{- include "xtrinode-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.gateway.apiServerAuth.secretKey | default "token" }}: {{ required "gateway.apiServerAuth.token is required when gateway.apiServerAuth.enabled=true and gateway.apiServerAuth.existingSecret is empty" .Values.gateway.apiServerAuth.token | quote }}
{{- end }}
