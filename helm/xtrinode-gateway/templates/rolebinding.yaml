{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "xtrinode-gateway.fullname" . }}
  namespace: {{ include "xtrinode-gateway.namespace" . }}
  labels:
    {{- include "xtrinode-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "xtrinode-gateway.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "xtrinode-gateway.serviceAccountName" . }}
  namespace: {{ include "xtrinode-gateway.namespace" . }}
{{- end }}
