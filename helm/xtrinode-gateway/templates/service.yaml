{{- if .Values.service.create }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xtrinode-gateway.fullname" . }}
  namespace: {{ include "xtrinode-gateway.namespace" . }}
  labels:
    {{- include "xtrinode-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "xtrinode-gateway.gatewaySelectorLabels" . | nindent 4 }}
{{- end }}
