{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "xtrinode-gateway.redisName" . }}
  namespace: {{ include "xtrinode-gateway.namespace" . }}
  labels:
    {{- include "xtrinode-gateway.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.service.port | default 6379 }}
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "xtrinode-gateway.redisSelectorLabels" . | nindent 4 }}
{{- end }}
