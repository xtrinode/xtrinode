{{- if and .Values.enabled .Values.serviceMonitor.enabled }}
apiVersion: {{ .Values.serviceMonitor.apiVersion | default "monitoring.coreos.com/v1" }}
kind: ServiceMonitor
metadata:
  name: {{ include "xtrinode-vector.fullname" . }}
  namespace: {{ include "xtrinode-vector.namespace" . }}
  labels:
    {{- include "xtrinode-vector.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.serviceMonitor.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "xtrinode-vector.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ include "xtrinode-vector.namespace" . }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.serviceMonitor.interval | default "30s" }}
      scrapeTimeout: {{ .Values.serviceMonitor.scrapeTimeout | default "10s" }}
{{- end }}
