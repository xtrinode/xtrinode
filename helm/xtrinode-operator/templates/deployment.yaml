apiVersion: apps/v1
kind: Deployment
{{- $operatorLifecycle := .Values.operator.lifecycle | default dict }}
metadata:
  name: {{ include "xtrinode-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xtrinode-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "xtrinode-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "xtrinode-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- $pullSecrets := concat (.Values.imagePullSecrets | default list) (.Values.global.imagePullSecrets | default list) | uniq }}
      {{- with $pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "xtrinode-operator.serviceAccountName" . }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ include "xtrinode-operator.image" . }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - /xtrinode
        args:
        - --leader-elect
        - --max-concurrent-reconciles={{ .Values.operator.workers | default 3 }}
        - --gateway-drain-duration={{ $operatorLifecycle.drainDuration | default "5m" }}
        - --gateway-drain-requeue-interval={{ $operatorLifecycle.drainRequeueInterval | default "30s" }}
        - --webhook-enabled={{ .Values.webhook.enabled }}
        {{- if .Values.webhook.enabled }}
        - --webhook-port={{ .Values.webhook.port }}
        - --webhook-cert-dir={{ .Values.webhook.certDir }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 8080
          protocol: TCP
        - name: health
          containerPort: 8081
          protocol: TCP
        {{- if .Values.webhook.enabled }}
        - name: webhook
          containerPort: {{ .Values.webhook.port }}
          protocol: TCP
        {{- end }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: WATCH_NAMESPACE
          value: {{ .Values.operator.watchNamespace | default .Values.watchNamespace | quote }}
        {{- if .Values.webhook.enabled }}
        volumeMounts:
        - name: webhook-certs
          mountPath: {{ .Values.webhook.certDir | quote }}
          readOnly: true
        {{- end }}
      {{- if .Values.webhook.enabled }}
      volumes:
      - name: webhook-certs
        secret:
          secretName: {{ include "xtrinode-operator.webhookSecretName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
