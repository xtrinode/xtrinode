{{- if and .Values.apiServer.auth.enabled .Values.apiServer.auth.resume.enabled (not .Values.apiServer.auth.resume.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "xtrinode-api-server.resumeAuthSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xtrinode-api-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.apiServer.auth.resume.secretKey | default "token" }}: {{ required "apiServer.auth.resume.token is required when apiServer.auth.resume.enabled=true and existingSecret is empty" .Values.apiServer.auth.resume.token | quote }}
{{- end }}
