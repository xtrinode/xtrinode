{{- if .Values.ingress.enabled -}}
{{- if not .Values.apiServer.auth.enabled -}}
{{- fail "xtrinode-api-server ingress exposure requires apiServer.auth.enabled=true; tenant-aware authorization is not implemented" }}
{{- end }}
{{- if eq (len .Values.ingress.tls) 0 -}}
{{- fail "xtrinode-api-server ingress exposure requires ingress.tls; tenant-aware authorization is not implemented" }}
{{- end }}
{{- if eq (len .Values.apiServer.cors.allowedOrigins) 0 -}}
{{- fail "xtrinode-api-server ingress exposure requires apiServer.cors.allowedOrigins with exact origins; tenant-aware authorization is not implemented" }}
{{- end }}
{{- range .Values.apiServer.cors.allowedOrigins }}
{{- if contains "*" . }}
{{- fail "xtrinode-api-server ingress exposure requires exact apiServer.cors.allowedOrigins without wildcards; tenant-aware authorization is not implemented" }}
{{- end }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "xtrinode-api-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xtrinode-api-server.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "xtrinode-api-server.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
