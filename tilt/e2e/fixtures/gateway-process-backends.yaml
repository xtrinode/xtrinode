apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-process-backend-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-process-backend-a
  template:
    metadata:
      labels:
        app: gateway-process-backend-a
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: python:3.12-alpine
          command: ["python", "/app/server.py"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: BACKEND_NAME
              value: process-a
            - name: STATUS_CODE
              value: "200"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: gateway-process-backend-script
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-process-backend-a
spec:
  selector:
    app: gateway-process-backend-a
  ports:
    - port: 8080
      targetPort: 8080
---
