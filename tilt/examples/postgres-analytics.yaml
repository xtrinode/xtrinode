apiVersion: v1
kind: Namespace
metadata:
  name: team-local
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: team-local
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: xtrinode-local-e2e
type: Opaque
stringData:
  username: trino
  password: trino
  database: analytics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: team-local
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: xtrinode-local-e2e
data:
  001-analytics.sql: |
    CREATE TABLE IF NOT EXISTS orders (
      order_id integer PRIMARY KEY,
      customer text NOT NULL,
      amount integer NOT NULL
    );

    INSERT INTO orders (order_id, customer, amount) VALUES
      (1, 'alice', 120),
      (2, 'bob', 75),
      (3, 'carol', 205)
    ON CONFLICT (order_id) DO NOTHING;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: team-local
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: xtrinode-local-e2e
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: xtrinode-local-e2e
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - trino
                - -d
                - analytics
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - trino
                - -d
                - analytics
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: postgres-data
          emptyDir: {}
        - name: postgres-init
          configMap:
            name: postgres-init
        - name: postgres-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: team-local
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: xtrinode-local-e2e
spec:
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
