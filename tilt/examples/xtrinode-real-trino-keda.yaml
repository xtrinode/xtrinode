apiVersion: analytics.xtrinode.io/v1
kind: XTrinodeCatalog
metadata:
  name: local-tpch
  namespace: team-local
  labels:
    team: team-local
    catalog-set: local-trino-keda
    catalog-type: tpch
spec:
  labels:
    team: team-local
    catalog-set: local-trino-keda
    catalog-type: tpch
  connector:
    tpch:
      properties:
        tpch.splits-per-node: "2"
---
apiVersion: analytics.xtrinode.io/v1
kind: XTrinodeCatalog
metadata:
  name: postgres
  namespace: team-local
  labels:
    team: team-local
    catalog-set: local-trino-keda
    catalog-type: postgres
spec:
  labels:
    team: team-local
    catalog-set: local-trino-keda
    catalog-type: postgres
  connector:
    postgres:
      connectionURL: jdbc:postgresql://postgres.team-local.svc.cluster.local:5432/analytics
      connectionUser: trino
      connectionPasswordSecret:
        name: postgres-credentials
        key: password
---
apiVersion: analytics.xtrinode.io/v1
kind: XTrinode
metadata:
  name: local-trino-keda
  namespace: team-local
  labels:
    team: team-local
    environment: local
spec:
  size: xs
  minWorkers: 1
  maxWorkers: 1
  suspended: false
  autoSuspendAfter: "5m"
  wakeMinWorkers: 1
  wakeTTL: "2m"

  catalogSelector:
    matchLabels:
      team: team-local
      catalog-set: local-trino-keda

  routing:
    header: "X-Trino-XTrinode=local-trino-keda"
    routingGroup: local-trino-keda

  keda:
    enabled: true
    scalerType: http
    scalingMetric: memory
    threshold: "80"
    scaleDownCooldown: "30s"

  limits:
    session:
      maxQueryMemory: 512MB
      maxTotalMemoryPerNode: 512MB

  resources:
    coordinator:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 1536Mi
    worker:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 1536Mi

  valuesOverlay:
    image:
      repository: trinodb/trino
      tag: "480"
      pullPolicy: IfNotPresent
    server:
      workers: 1
    coordinator:
      additionalJVMConfig:
        - -Xmx768M
        - -XX:ReservedCodeCacheSize=128M
      startupProbe:
        exec:
          command:
            - /usr/lib/trino/bin/health-check
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 90
    worker:
      additionalJVMConfig:
        - -Xmx768M
        - -XX:ReservedCodeCacheSize=128M
      startupProbe:
        exec:
          command:
            - /usr/lib/trino/bin/health-check
        initialDelaySeconds: 10
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 90
    additionalConfigProperties:
      - query.max-memory=512MB
      - query.max-memory-per-node=384MB
      - memory.heap-headroom-per-node=256MB
